<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoBus Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 40px; text-align: center; }
    h1 { color: #1976d2; }
    form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: inline-block; }
    input { display: block; margin: 10px auto; padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #1976d2; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #125ea8; }
  </style>
</head>
<body>
  <h1>🚌 GoBus User Login</h1>
  <form onsubmit="registerUser(event)">
    <input type="text" id="name" placeholder="Enter your name" required>
    <input type="email" id="email" placeholder="Enter your email" required>
    <input type="text" id="contact" placeholder="Enter your contact number" required>
    <button type="submit">Register</button>
  </form>

  <script>
    async function registerUser(event) {
      event.preventDefault();

      const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        contactNo: document.getElementById("contact").value
      };

      const res = await fetch("http://localhost:8080/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
      });

      const msg = await res.text();
      alert(msg);
    }
  </script>
</body>
</html>
